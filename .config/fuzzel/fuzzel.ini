[main]
font=FiraCode Nerd Font:size=16
use-bold=no
password-character=*
match-mode=fzf
match-counter=no
terminal=kitty {cmd}
width=40
lines=10
line-height=26
inner-pad=10
horizontal-pad=30
vertical-pad=10
keyboard-focus=on-demand
exit-on-keyboard-focus-loss=yes
prompt='> '
hide-prompt=no
icon-theme=breeze
icons-enabled=yes

[colors]
background=1e1e2eff
text=cdd6f4ff
prompt=bac2deff
placeholder=7f849cff
input=cdd6f4ff
match=89b4faff
selection=585b70ff
selection-text=cdd6f4ff
selection-match=89b4faff
counter=7f849cff
border=89b4faff

[border]
width=2
selection-radius=4
